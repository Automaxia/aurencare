# ──────────────────────────────────────────────────────────────────────────
# Secret `aurencare-secrets` — Auren Care (TEMPLATE)
#
# O secret atual no cluster tem valores PLACEHOLDER (localhost / example.com).
# Este template já vem com os HOSTS in-cluster corretos preenchidos.
# Preencha os <...> sensíveis e aplique:
#
#   kubectl apply -f k8s/aurencare-secrets.example.yaml
#   kubectl rollout restart deploy/aurencare-web deploy/aurencare-api -n aurencare
#
# ⚠️  NÃO commitar este arquivo com valores reais. Use stringData (texto puro);
#     o k8s converte para base64 automaticamente.
#
# Hosts in-cluster confirmados:
#   Postgres : postgres-service.postgresql.svc.cluster.local:5432
#   Redis    : redis.database.svc.cluster.local:6379
#   Evolution: (svc no namespace `evolution` — ajuste a URL real)
# ──────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: aurencare-secrets
  namespace: aurencare
type: Opaque
stringData:
  # ───────────── Banco / Cache (hosts do cluster) ─────────────
  DATABASE_URL: "postgresql://<DB_USER>:<DB_PASS>@postgres-service.postgresql.svc.cluster.local:5432/aurencare"
  REDIS_URL: "redis://:Fzc3dvcmQ@redis.database.svc.cluster.local:6379/0"

  # ───────────── NextAuth (URL pública de produção) ─────────────
  NEXTAUTH_URL: "https://app.aurencare.ia.br"
  NEXTAUTH_SECRET: "<gere: openssl rand -base64 48>"

  # ───────────── Cripto (32 bytes em hex = 64 chars) ─────────────
  ENCRYPTION_KEY: "<gere: openssl rand -hex 32>"

  # ───────────── Anthropic / Transcrição ─────────────
  ANTHROPIC_API_KEY: "sk-ant-<...>"
  ASSEMBLYAI_API_KEY: "<...>"

  # ───────────── WhatsApp / Evolution API ─────────────
  EVOLUTION_API_URL: "http://evolution-api-service.evolution.svc.cluster.local:8080"
  EVOLUTION_API_KEY: "<...>"
  EVOLUTION_INSTANCE_NAME: "auren-care"

  # ───────────── Pagar.me ─────────────
  PAGARME_API_KEY: "sk_live_<...>"
  PAGARME_WEBHOOK_SECRET: "<...>"
  PAGARME_ENCRYPTION_KEY: "ek_live_<...>"

  # ───────────── WebRTC / TURN (vídeo atrás de NAT/4G) ─────────────
  # STUN do Google é sempre usado (sem config). TURN só ativa com o abaixo.
  # URLs do coturn (csv) — udp/tcp + turns(TLS) cobre redes que bloqueiam UDP:
  TURN_URLS: "turn:turn.audere.ia.br:3478?transport=udp,turn:turn.audere.ia.br:3478?transport=tcp,turns:turn.audere.ia.br:5349"
  # Modo PREFERIDO — credenciais efêmeras (coturn `use-auth-secret`).
  # Mesmo valor de `static-auth-secret` no coturn:
  TURN_STATIC_AUTH_SECRET: "<gere: openssl rand -hex 32>"
  TURN_TTL: "3600"
  # Modo alternativo — serviço TURN gerenciado (Twilio/Metered). Use UM dos dois:
  # TURN_USERNAME: "<...>"
  # TURN_PASSWORD: "<...>"

  # ───────────── Público (browser) ─────────────
  NEXT_PUBLIC_APP_NAME: "Auren Care"
  NEXT_PUBLIC_WS_URL: "wss://app.aurencare.ia.br"
