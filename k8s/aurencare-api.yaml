# ──────────────────────────────────────────────────────────────────────────
# Auren Care é um monolito Next.js: frontend e API são o MESMO app/imagem.
# Não há deployment de API separado — este arquivo mantém apenas o Ingress
# do host `api.aurencare.ia.br`, roteado para o mesmo Service do web.
# (Útil p/ ter um hostname dedicado a webhooks/API sem duplicar pods.)
# ──────────────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aurencare-api-ingress
  namespace: aurencare
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod-cluster"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-connections: "50"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-body-size: "20m"
spec:
  ingressClassName: "nginx"
  tls:
  - hosts:
    - api.aurencare.ia.br
    secretName: aurencare-api-tls-cert
  rules:
  - host: api.aurencare.ia.br
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: aurencare-web-service   # mesmo Service do web (monolito)
            port:
              number: 80
