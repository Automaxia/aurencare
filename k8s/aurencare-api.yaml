apiVersion: apps/v1
kind: Deployment
metadata:
  name: aurencare-api
  namespace: aurencare
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: aurencare-api
  template:
    metadata:
      labels:
        app: aurencare-api
      annotations:
        recreatePod: "{{.Release.Time.Seconds}}"
    spec:
      restartPolicy: Always
      containers:
      - name: aurencare-api
        image: wesleyromualdo/aurencare-api:latest
        ports:
        - containerPort: 3000
        envFrom:
          - secretRef:
              name: aurencare-secrets
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 45
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 5
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 60
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 5
        resources:
          requests:
            memory: "1Gi"
            cpu: "750m"
          limits:
            memory: "2Gi"
            cpu: "1500m"
      imagePullSecrets:
      - name: automaxia-secreto-docker
---
apiVersion: v1
kind: Service
metadata:
  name: aurencare-api-service
  namespace: aurencare
spec:
  selector:
    app: aurencare-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aurencare-api-ingress
  namespace: aurencare
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod-cluster"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-connections: "50"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-body-size: "20m"
spec:
  ingressClassName: "nginx"
  tls:
  - hosts:
    - api.aurencare.ia.br
    secretName: aurencare-api-tls-cert
  rules:
  - host: api.aurencare.ia.br
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: aurencare-api-service
            port:
              number: 80
