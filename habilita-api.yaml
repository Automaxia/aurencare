apiVersion: apps/v1
kind: Deployment
metadata:
  name: habilita-api
  namespace: habilita
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: habilita-api
  template:
    metadata:
      labels:
        app: habilita-api
      annotations:
        recreatePod: "{{.Release.Time.Seconds}}"
    spec:
      restartPolicy: Always
      containers:
      - name: habilita-api
        image: wesleyromualdo/habilita-api:latest
        ports:
        - containerPort: 8000
        env:
          - name: AWS_ACCESS_KEY_ID
            valueFrom:
              secretKeyRef:
                name: storage-credentials
                key: AWS_ACCESS_KEY_ID
          - name: AWS_SECRET_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: storage-credentials
                key: AWS_SECRET_ACCESS_KEY
          - name: AWS_ENDPOINT_URL
            valueFrom:
              secretKeyRef:
                name: storage-credentials
                key: AWS_ENDPOINT_URL
          - name: STORAGE_BUCKET_NAME
            valueFrom:
              secretKeyRef:
                name: storage-credentials
                key: STORAGE_BUCKET_NAME
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 45
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 5
        resources:
          requests:
            memory: "1Gi"
            cpu: "750m"
          limits:
            memory: "2Gi"
            cpu: "1500m"
      imagePullSecrets:
      - name: automaxia-secreto-docker
---
apiVersion: v1
kind: Service
metadata:
  name: habilita-api-service
  namespace: habilita
spec:
  selector:
    app: habilita-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: habilita-api-ingress
  namespace: habilita
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod-cluster"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-connections: "50"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-body-size: "20m"
spec:
  ingressClassName: "nginx"
  tls:
  - hosts:
    - api.habilita.app.br
    secretName: habilita-api-tls-cert
  rules:
  - host: api.habilita.app.br
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: habilita-api-service
            port:
              number: 80