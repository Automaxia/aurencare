services:
  postgres:
    image: postgres:16-alpine
    container_name: aurencare-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: aurencare
      POSTGRES_PASSWORD: aurencare
      POSTGRES_DB: aurencare
    ports:
      - "5432:5432"
    volumes:
      - aurencare-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aurencare -d aurencare"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: aurencare-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - aurencare-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  adminer:
    image: adminer:latest
    container_name: aurencare-adminer
    restart: unless-stopped
    profiles: [tools]
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  aurencare-pg:
  aurencare-redis:
